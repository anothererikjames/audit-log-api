openapi: 3.0.3
info:
  title: Audit Log API
  description: Immutable audit trail, compliance logging, and event history for Acme Corp
  version: 3.0.2
  contact:
    name: Security Team
    email: security@acme.com
  x-domain: audit
  x-tier: standard
servers:
  - url: https://audit.api.example.com/v1
    description: Production
  - url: https://audit-dev.api.example.com/v1
    description: Development
tags:
  - name: events
  - name: reports
  - name: retention
paths:
  /health:
    get:
      summary: Health check
      operationId: getHealth
      tags: [events]
      responses:
        '200':
          description: Healthy
          content:
            application/json:
              schema:
                type: object
                properties:
                  status: { type: string }
                  version: { type: string }
                  storage_used_gb: { type: number }
  /events:
    get:
      summary: Query audit events
      operationId: listEvents
      tags: [events]
      security:
        - BearerAuth: []
      parameters:
        - name: actor_id
          in: query
          schema: { type: string }
        - name: resource_type
          in: query
          schema: { type: string }
        - name: action
          in: query
          schema: { type: string }
        - name: from
          in: query
          schema: { type: string, format: date-time }
        - name: to
          in: query
          schema: { type: string, format: date-time }
        - name: page
          in: query
          schema: { type: integer, default: 1 }
        - name: limit
          in: query
          schema: { type: integer, default: 50, maximum: 500 }
      responses:
        '200':
          description: Audit events
          content:
            application/json:
              schema:
                type: object
                properties:
                  events:
                    type: array
                    items: { $ref: '#/components/schemas/AuditEvent' }
                  total: { type: integer }
                  page: { type: integer }
    post:
      summary: Record audit event
      operationId: recordEvent
      tags: [events]
      security:
        - BearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateEventRequest'
      responses:
        '201':
          description: Event recorded
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AuditEvent'
  /events/{eventId}:
    get:
      summary: Get audit event
      operationId: getEvent
      tags: [events]
      security:
        - BearerAuth: []
      parameters:
        - name: eventId
          in: path
          required: true
          schema: { type: string, format: uuid }
      responses:
        '200':
          description: Audit event details
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AuditEvent'
        '404':
          description: Event not found
  /reports:
    post:
      summary: Generate compliance report
      operationId: generateReport
      tags: [reports]
      security:
        - BearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [type, from, to]
              properties:
                type:
                  type: string
                  enum: [soc2, gdpr, hipaa, pci, custom]
                from: { type: string, format: date }
                to: { type: string, format: date }
                resource_types: { type: array, items: { type: string } }
                format:
                  type: string
                  enum: [pdf, csv, json]
                  default: pdf
      responses:
        '202':
          description: Report generation started
          content:
            application/json:
              schema:
                type: object
                properties:
                  report_id: { type: string, format: uuid }
                  status: { type: string }
                  download_url: { type: string }
  /retention:
    get:
      summary: Get retention policy
      operationId: getRetentionPolicy
      tags: [retention]
      security:
        - BearerAuth: []
      responses:
        '200':
          description: Retention policy
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/RetentionPolicy'
    put:
      summary: Update retention policy
      operationId: updateRetentionPolicy
      tags: [retention]
      security:
        - BearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/RetentionPolicy'
      responses:
        '200':
          description: Policy updated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/RetentionPolicy'
components:
  securitySchemes:
    BearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
  schemas:
    AuditEvent:
      type: object
      properties:
        id: { type: string, format: uuid }
        actor_id: { type: string }
        actor_type:
          type: string
          enum: [user, service, system]
        action: { type: string, example: user.login }
        resource_type: { type: string, example: user }
        resource_id: { type: string }
        ip_address: { type: string }
        user_agent: { type: string }
        outcome:
          type: string
          enum: [success, failure, error]
        metadata: { type: object }
        timestamp: { type: string, format: date-time }
    CreateEventRequest:
      type: object
      required: [actor_id, actor_type, action, resource_type, outcome]
      properties:
        actor_id: { type: string }
        actor_type: { type: string, enum: [user, service, system] }
        action: { type: string }
        resource_type: { type: string }
        resource_id: { type: string }
        outcome: { type: string, enum: [success, failure, error] }
        metadata: { type: object }
    RetentionPolicy:
      type: object
      properties:
        default_days: { type: integer, example: 365 }
        compliance_days: { type: integer, example: 2555 }
        resource_overrides:
          type: array
          items:
            type: object
            properties:
              resource_type: { type: string }
              retention_days: { type: integer }
