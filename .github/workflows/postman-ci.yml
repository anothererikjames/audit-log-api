name: Postman Collection Tests

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    name: Run Audit Log API Tests
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install Newman
        run: npm install -g newman newman-reporter-htmlextra

      - name: Run collection
        env:
          BASE_URL: ${{ secrets.AUDIT_API_BASE_URL }}
          ACCESS_TOKEN: ${{ secrets.AUDIT_TEST_TOKEN }}
          STREAM_ID: ${{ secrets.AUDIT_TEST_STREAM_ID }}
        run: |
          newman run "postman/collections/Audit Log API.postman_collection.json" \
            --environment "postman/environments/production.postman_environment.json" \
            --env-var "baseUrl=${BASE_URL}" \
            --env-var "accessToken=${ACCESS_TOKEN}" \
            --env-var "streamId=${STREAM_ID}" \
            --reporters cli,htmlextra \
            --reporter-htmlextra-export reports/audit-log-api-results.html \
            --bail

      - name: Upload test report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: audit-log-api-test-report
          path: reports/
