name: Postman Collection Tests

on:
  workflow_dispatch:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    name: Run Audit Log API Tests
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install Newman
        run: npm install -g newman newman-reporter-htmlextra

      - name: Run collection against Postman Cloud Mock
        run: |
          newman run "postman/collections/Audit Log API.postman_collection.json" \
            --environment "postman/environments/production.postman_environment.json" \
            --reporters cli,htmlextra \
            --reporter-htmlextra-export reports/audit-log-api-results.html \
            --bail

      - name: Upload test report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: audit-log-api-test-report
          path: reports/
